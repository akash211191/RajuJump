<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Raju Jump</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#7a1f1f">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: linear-gradient(180deg, #ff9933 0%, #ffd699 40%, #fff 60%, #138808 100%);
    font-family: 'Segoe UI', Arial, sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100vh; overflow:hidden;
  }
  h1 { color:#7a1f1f; margin:10px 0 4px; text-shadow:1px 1px 0 #fff; }
  #sub { color:#444; margin-bottom:8px; font-size:14px; }
  canvas {
    background:#bfe9ff;
    border:6px solid #c2884a;
    border-radius:8px;
    box-shadow:0 8px 24px rgba(0,0,0,0.3);
    touch-action:none;
  }
  #hud {
    display:flex; gap:20px; margin:8px 0; font-weight:bold; color:#7a1f1f; font-size:16px;
  }
  #msg {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    background:rgba(0,0,0,0.75); color:#fff; padding:20px 30px; border-radius:10px;
    font-size:20px; text-align:center; display:none; z-index:10;
  }
  #msg button {
    margin-top:12px; padding:8px 16px; border:none; border-radius:6px;
    background:#ff9933; color:#fff; font-weight:bold; cursor:pointer; font-size:14px;
  }
  #controls {
    margin-top:10px; display:flex; gap:10px;
  }
  .ctrlBtn {
    width:60px; height:60px; border-radius:50%; border:none;
    background:#7a1f1f; color:#fff; font-size:22px; font-weight:bold;
    box-shadow:0 4px 0 #4a0f0f; user-select:none;
  }
  .ctrlBtn:active { transform:translateY(3px); box-shadow:0 1px 0 #4a0f0f; }
  #wrap { position:relative; }
</style>
</head>
<body>
<h1>🪔 Raju Jump 🪔</h1>
<div id="sub">Save Dadi's sweet shop! Arrow keys / WASD / buttons to move & jump.</div>
<div id="hud">
  <span>🍬 Score: <span id="score">0</span></span>
  <span>❤️ Lives: <span id="lives">3</span></span>
  <span>🌶️ Level: <span id="level">1</span>/3</span>
</div>
<div id="wrap">
  <canvas id="game" width="800" height="420"></canvas>
  <div id="msg"><div id="msgText"></div><button onclick="restart()">Play Again</button></div>
</div>
<div id="controls">
  <button class="ctrlBtn" id="btnLeft">◀</button>
  <button class="ctrlBtn" id="btnJump">▲</button>
  <button class="ctrlBtn" id="btnRight">▶</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GRAVITY = 0.6;
const FRICTION = 0.85;

let score = 0, lives = 3, levelIndex = 0, gameOver = false, won = false;
const keys = {};

document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function bindBtn(id, key) {
  const el = document.getElementById(id);
  el.addEventListener('mousedown', () => keys[key] = true);
  el.addEventListener('mouseup', () => keys[key] = false);
  el.addEventListener('mouseleave', () => keys[key] = false);
  el.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; });
  el.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; });
}
bindBtn('btnLeft', 'arrowleft');
bindBtn('btnRight', 'arrowright');
bindBtn('btnJump', ' ');

// ---- Level Definitions ----
function makeLevel(groundSegs, platforms, items, enemies, goalX, theme) {
  return { groundSegs, platforms, items, enemies, goalX, theme };
}

const levels = [
  makeLevel(
    [{x:0,w:800}],
    [
      {x:150,y:320,w:90,h:16},
      {x:320,y:260,w:90,h:16},
      {x:500,y:320,w:90,h:16},
      {x:650,y:220,w:90,h:16},
    ],
    [
      {x:180,y:280,type:'jalebi'},
      {x:350,y:220,type:'coin'},
      {x:530,y:280,type:'coin'},
      {x:680,y:180,type:'coin'},
      {x:240,y:360,type:'coin'},
    ],
    [
      {x:400,y:364,w:30,h:26,dir:1,range:[350,470],type:'monkey'},
    ],
    760, 'village'
  ),
  makeLevel(
    [{x:0,w:200},{x:280,w:120},{x:480,w:120},{x:680,w:120}],
    [
      {x:230,y:300,w:60,h:16},
      {x:420,y:250,w:60,h:16},
      {x:620,y:300,w:60,h:16},
    ],
    [
      {x:250,y:260,type:'jalebi'},
      {x:440,y:210,type:'coin'},
      {x:640,y:260,type:'coin'},
      {x:60,y:360,type:'coin'},
    ],
    [
      {x:300,y:364,w:30,h:26,dir:1,range:[290,360],type:'mosquito'},
      {x:550,y:364,w:30,h:26,dir:-1,range:[490,580],type:'mosquito'},
    ],
    760, 'train'
  ),
  makeLevel(
    [{x:0,w:800}],
    [
      {x:120,y:330,w:80,h:16},
      {x:260,y:280,w:80,h:16},
      {x:400,y:230,w:80,h:16},
      {x:540,y:280,w:80,h:16},
      {x:660,y:330,w:80,h:16},
    ],
    [
      {x:150,y:290,type:'coin'},
      {x:290,y:240,type:'coin'},
      {x:430,y:190,type:'jalebi'},
      {x:570,y:240,type:'coin'},
      {x:690,y:290,type:'coin'},
    ],
    [
      {x:300,y:364,w:34,h:30,dir:1,range:[200,500],type:'goon'},
      {x:550,y:364,w:34,h:30,dir:-1,range:[450,700],type:'goon'},
    ],
    760, 'construction'
  ),
];

let player, currentLevel, camX;

function loadLevel(i) {
  currentLevel = JSON.parse(JSON.stringify(levels[i]));
  player = { x:40, y:300, w:30, h:36, vx:0, vy:0, onGround:false, facing:1, invincible:0 };
  camX = 0;
  gameOver = false; won = false;
  document.getElementById('msg').style.display = 'none';
}

function restart() {
  score = 0; lives = 3; levelIndex = 0;
  updateHUD();
  loadLevel(0);
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  document.getElementById('level').textContent = levelIndex + 1;
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function update() {
  if (gameOver || won) return;
  const lvl = currentLevel;

  // input
  if (keys['arrowleft'] || keys['a']) { player.vx -= 0.8; player.facing = -1; }
  if (keys['arrowright'] || keys['d']) { player.vx += 0.8; player.facing = 1; }
  if ((keys['arrowup'] || keys['w'] || keys[' ']) && player.onGround) {
    player.vy = -13; player.onGround = false;
  }

  player.vx *= FRICTION;
  player.vx = Math.max(-6, Math.min(6, player.vx));
  player.vy += GRAVITY;
  if (player.vy > 16) player.vy = 16;

  player.x += player.vx;
  player.y += player.vy;
  if (player.x < 0) player.x = 0;

  player.onGround = false;

  // ground collision
  for (const seg of lvl.groundSegs) {
    if (player.x + player.w > seg.x && player.x < seg.x + seg.w) {
      const groundY = 360;
      if (player.y + player.h > groundY && player.y + player.h - player.vy <= groundY + 1) {
        player.y = groundY - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  }
  // fall in gap = lose life
  if (player.y > H + 50) {
    loseLife();
    return;
  }

  // platform collision
  for (const p of lvl.platforms) {
    const pb = { x:p.x, y:p.y, w:p.w, h:p.h };
    if (player.x + player.w > pb.x && player.x < pb.x + pb.w) {
      const prevBottom = player.y + player.h - player.vy;
      if (player.vy >= 0 && prevBottom <= pb.y + 1 && player.y + player.h >= pb.y) {
        player.y = pb.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  }

  // items
  lvl.items = lvl.items.filter(it => {
    const ib = {x:it.x, y:it.y, w:20, h:20};
    if (rectsOverlap(player, ib)) {
      if (it.type === 'coin') score += 10;
      if (it.type === 'jalebi') { score += 30; player.invincible = 300; }
      return false;
    }
    return true;
  });

  if (player.invincible > 0) player.invincible--;

  // enemies
  for (const e of lvl.enemies) {
    e.x += e.dir * 1.5;
    if (e.x < e.range[0] || e.x + e.w > e.range[1]) e.dir *= -1;
    const eb = {x:e.x, y:e.y, w:e.w, h:e.h};
    if (rectsOverlap(player, eb)) {
      if (player.invincible > 0) {
        // defeat enemy
        e._dead = true;
        score += 20;
      } else if (player.vy > 2 && player.y + player.h - player.vy <= e.y + 5) {
        e._dead = true;
        score += 20;
        player.vy = -8;
      } else {
        loseLife();
        return;
      }
    }
  }
  lvl.enemies = lvl.enemies.filter(e => !e._dead);

  // win condition
  if (player.x > lvl.goalX) {
    if (levelIndex < levels.length - 1) {
      levelIndex++;
      updateHUD();
      loadLevel(levelIndex);
    } else {
      won = true;
      showMsg("🎉 Dadi's sweet shop is saved! Final Score: " + score);
    }
  }

  camX = Math.max(0, Math.min(player.x - 300, 900));
  updateHUD();
}

function loseLife() {
  lives--;
  updateHUD();
  if (lives <= 0) {
    gameOver = true;
    showMsg('😢 Game Over! Score: ' + score);
  } else {
    player.x = 40; player.y = 300; player.vx = 0; player.vy = 0;
  }
}

function showMsg(text) {
  document.getElementById('msgText').textContent = text;
  document.getElementById('msg').style.display = 'block';
}

function bgColors(theme) {
  if (theme === 'village') return ['#bfe9ff','#e8c98b'];
  if (theme === 'train') return ['#9fd8f0','#888'];
  return ['#f0c987','#aaa'];
}

function draw() {
  const lvl = currentLevel;
  const [sky, ground] = bgColors(lvl.theme);
  ctx.fillStyle = sky;
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.translate(-camX, 0);

  // sun
  ctx.fillStyle = '#ffcc33';
  ctx.beginPath(); ctx.arc(80+camX*0.3, 60, 30, 0, 7); ctx.fill();

  // ground segments
  ctx.fillStyle = '#7a4a1f';
  for (const seg of lvl.groundSegs) {
    ctx.fillRect(seg.x, 360, seg.w, 60);
    ctx.fillStyle = '#5a8f3a';
    ctx.fillRect(seg.x, 356, seg.w, 8);
    ctx.fillStyle = '#7a4a1f';
  }

  // platforms
  ctx.fillStyle = '#c2884a';
  for (const p of lvl.platforms) {
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#e0a868';
    ctx.fillRect(p.x, p.y, p.w, 4);
    ctx.fillStyle = '#c2884a';
  }

  // items
  for (const it of lvl.items) {
    ctx.font = '20px Arial';
    ctx.fillText(it.type === 'coin' ? '🪙' : '🍯', it.x, it.y+18);
  }

  // enemies
  for (const e of lvl.enemies) {
    ctx.font = (e.h+4)+'px Arial';
    const icon = e.type === 'monkey' ? '🐒' : e.type === 'mosquito' ? '🦟' : '👹';
    ctx.fillText(icon, e.x, e.y+e.h);
  }

  // goal flag
  ctx.font = '40px Arial';
  ctx.fillText('🏁', lvl.goalX, 350);
  ctx.font = '28px Arial';
  ctx.fillText('🍬', lvl.goalX+5, 320);

  // player
  ctx.save();
  ctx.translate(player.x + player.w/2, player.y + player.h/2);
  if (player.facing < 0) ctx.scale(-1,1);
  ctx.font = '34px Arial';
  ctx.globalAlpha = player.invincible > 0 && Math.floor(player.invincible/5)%2===0 ? 0.4 : 1;
  ctx.fillText('🏃', -17, 14);
  ctx.globalAlpha = 1;
  ctx.restore();

  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

restart();
loop();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
</script>
</body>
</html>
